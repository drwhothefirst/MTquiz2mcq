<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medical Terminology Quiz — BMC</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b27;
    --surface2: #1e2535;
    --border: #2a3347;
    --accent: #4f9cf9;
    --accent2: #7ee8a2;
    --danger: #ff6b6b;
    --warn: #ffd166;
    --text: #e8edf5;
    --muted: #8b96aa;
    --correct: #1a3d2b;
    --correct-border: #4ade80;
    --wrong: #3d1a1a;
    --wrong-border: #f87171;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    min-height: 100vh;
    line-height: 1.6;
    background-image: radial-gradient(ellipse at 20% 50%, rgba(79,156,249,0.04) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 20%, rgba(126,232,162,0.04) 0%, transparent 50%);
  }

  /* ── Header ── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(13,17,23,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }
  .logo { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--accent); letter-spacing: -0.5px; }
  .logo span { color: var(--accent2); }
  .header-stats { display: flex; gap: 1.5rem; font-size: 0.82rem; color: var(--muted); }
  .stat-pill {
    background: var(--surface2); border: 1px solid var(--border);
    padding: 4px 12px; border-radius: 20px;
    display: flex; align-items: center; gap: 6px;
  }
  .stat-pill b { color: var(--text); font-weight: 600; }

  /* ── Filters ── */
  .filter-bar {
    padding: 1.5rem 2rem 0;
    display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center;
    max-width: 800px; margin: 0 auto;
  }
  .filter-label { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-right: 4px; }
  .chip {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--muted); padding: 6px 14px; border-radius: 20px;
    font-size: 0.82rem; cursor: pointer; transition: all .2s;
    font-family: 'DM Sans', sans-serif;
  }
  .chip:hover, .chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .chip.active { font-weight: 600; }

  /* ── Progress bar ── */
  .progress-wrap { padding: 1rem 2rem 0; max-width: 1400px; margin: 0 auto; }
  .progress-bar { height: 4px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 4px; transition: width .5s ease; width: 0%; }
  .progress-text { font-size: 0.78rem; color: var(--muted); margin-top: 6px; }

  /* ── Grid ── */
  .quiz-grid {
    display: grid;
    grid-template-columns: 1fr;
    justify-content: center;
    
    gap: 1.5rem;
    padding: 1.5rem 2rem 4rem;
    max-width: 1400px; margin: 0 auto;
  }

  /* ── Card ── */
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    position: relative;
    transition: transform .2s, border-color .2s, box-shadow .2s;
    display: flex; flex-direction: column; gap: 1rem;
    animation: fadeUp .4s ease both;
  }
  .q-card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,.4); border-color: #3a4557; }
  .q-card.answered { border-color: var(--border); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-meta {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 0.75rem;
  }
  .q-num { color: var(--muted); font-weight: 500; }
  .diff-badge {
    padding: 3px 10px; border-radius: 12px; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .diff-mild { background: rgba(126,232,162,.12); color: var(--accent2); }
  .diff-medium { background: rgba(255,209,102,.12); color: var(--warn); }
  .diff-hard { background: rgba(255,107,107,.12); color: var(--danger); }

  .topic-tag {
    font-size: 0.72rem; color: var(--accent); background: rgba(79,156,249,.1);
    border-radius: 8px; padding: 2px 8px; margin-left: 6px;
  }

  .q-text {
    text-align: center;
    font-size: 0.97rem; color: var(--text); font-weight: 500; line-height: 1.5;
  }

  /* ── Options ── */
  .options {
    align-items: center; display: flex; flex-direction: column; gap: 0.5rem; }
  .opt {
    width: 100%;
    max-width: 650px;
    color: #ffffff;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 0.65rem 1rem;
    cursor: pointer;
    display: flex; align-items: center; gap: 10px;
    font-size: 0.88rem;
    transition: all .18s;
    position: relative;
  }
  .opt:hover:not(.locked) { border-color: var(--accent); background: rgba(79,156,249,.07); }
  .opt-letter {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--border); color: var(--muted);
    font-size: 0.72rem; font-weight: 700; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all .18s;
  }
  .opt:hover:not(.locked) .opt-letter { background: var(--accent); color: #fff; }
  .opt.correct-ans { background: var(--correct); border-color: var(--correct-border); }
  .opt.correct-ans .opt-letter { background: var(--correct-border); color: #fff; }
  .opt.wrong-ans { background: var(--wrong); border-color: var(--wrong-border); }
  .opt.wrong-ans .opt-letter { background: var(--wrong-border); color: #fff; }
  .opt.locked { cursor: default; }

  .opt-check { margin-left: auto; font-size: 1rem; }

  /* ── Info tooltip ── */
  .info-wrap { position: relative; display: inline-flex; }
  .info-btn {
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--muted); font-size: 0.68rem; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0; transition: all .15s;
    font-family: serif;
  }
  .info-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

  .info-popup {
    display: none;
    position: absolute; bottom: calc(100% + 8px); left: 50%;
    transform: translateX(-50%);
    background: #1a2235; border: 1px solid var(--accent);
    border-radius: 10px; padding: 10px 14px;
    font-size: 0.8rem; color: var(--text); line-height: 1.5;
    width: 260px; z-index: 50;
    box-shadow: 0 8px 24px rgba(0,0,0,.5);
    pointer-events: none;
  }
  .info-popup::after {
    content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
    border: 6px solid transparent; border-top-color: var(--accent);
  }
  .info-btn:hover + .info-popup,
  .info-wrap:focus-within .info-popup { display: block; }

  /* ── Explanation ── */
  .explanation {
    display: none;
    background: rgba(79,156,249,.06); border: 1px solid rgba(79,156,249,.2);
    border-radius: 10px; padding: 0.75rem 1rem;
    font-size: 0.83rem; color: var(--muted); line-height: 1.55;
  }
  .explanation.show { display: block; animation: fadeUp .25s ease; }
  .explanation strong { color: var(--accent2); }

  /* ── Result banner ── */
  .result-banner {
    display: none;
    max-width: 1400px; margin: 2rem auto 0; padding: 0 2rem;
    animation: fadeUp .4s ease;
  }
  .result-inner {
    background: linear-gradient(135deg, var(--surface2), var(--surface));
    border: 1px solid var(--border); border-radius: 16px;
    padding: 2rem; text-align: center;
  }
  .result-score { font-family: 'Playfair Display', serif; font-size: 3.5rem; color: var(--accent); line-height: 1; }
  .result-label { color: var(--muted); margin-top: 4px; font-size: 0.9rem; }
  .result-msg { margin-top: 1rem; font-size: 1.1rem; font-weight: 500; }
  .btn-reset {
    margin-top: 1.5rem;
    background: var(--accent); color: #fff; border: none;
    padding: 12px 32px; border-radius: 10px; font-size: 0.9rem;
    font-weight: 600; cursor: pointer; transition: opacity .2s;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-reset:hover { opacity: .85; }

  /* ── Submit button ── */
  .submit-wrap { max-width: 1400px; margin: 0 auto; padding: 0 2rem 2rem; display: flex; gap: 1rem; }
  .btn-submit {
    background: linear-gradient(135deg, var(--accent), #3b82f6);
    color: #fff; border: none; padding: 14px 40px; border-radius: 12px;
    font-size: 1rem; font-weight: 600; cursor: pointer; transition: all .2s;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(79,156,249,.35); }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── Section header ── */
  .section-header {
    max-width: 1400px; margin: 2rem auto 0; padding: 0 2rem;
    border-left: 3px solid var(--accent); padding-left: 1.5rem;
  }
  .section-header h2 { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--text); }
  .section-header p { font-size: 0.82rem; color: var(--muted); margin-top: 2px; }

  @media (max-width: 600px) {
    .quiz-grid { grid-template-columns: 1fr; padding: 1rem; }
    .filter-bar { padding: 1rem; }
    header { padding: 0 1rem; }
  }

  /* ── Mobile Responsive Upgrade ── */
  @media (max-width: 768px) {

    body {
      overflow-x: hidden;
    }

    header {
      height: auto;
      padding: 1rem;
      flex-direction: column;
      gap: 0.8rem;
      text-align: center;
    }

    .logo {
      font-size: 1.3rem;
    }

    .header-stats {
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.6rem;
      width: 100%;
    }

    .stat-pill {
      font-size: 0.75rem;
      padding: 6px 10px;
    }

    .filter-bar {
      padding: 1rem;
      gap: 0.5rem;
      justify-content: center;
    }

    .chip {
      font-size: 0.75rem;
      padding: 7px 12px;
    }

    .progress-wrap {
      padding: 1rem;
    }

    .quiz-grid {
      padding: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .q-card {
      width: 100%;
      max-width: 100%;
      padding: 1rem;
      border-radius: 14px;
    }

    .q-text {
      font-size: 1rem;
      line-height: 1.5;
      text-align: center;
    }

    .options {
      width: 100%;
      align-items: center;
    }

    .opt {
      width: 100%;
      max-width: 100%;
      min-height: 56px;
      font-size: 0.95rem;
      padding: 0.9rem;
      border-radius: 12px;
    }

    .opt-letter {
      width: 26px;
      height: 26px;
      font-size: 0.78rem;
    }

    .submit-wrap {
      padding: 1rem;
      justify-content: center;
    }

    .btn-submit,
    .btn-reset {
      width: 100%;
      max-width: 100%;
      font-size: 1rem;
      padding: 14px;
      border-radius: 12px;
    }

    .result-inner {
      padding: 1.5rem 1rem;
    }

    .result-score {
      font-size: 2.8rem;
    }

    .info-popup {
      width: 220px;
      font-size: 0.75rem;
    }
  }

</style>
</head>
<body>

<header>
  <div class="logo">Medical<span>Quiz</span></div>
  <div class="header-stats">
    <div class="stat-pill">Questions: <b id="totalCount">0</b></div>
    <div class="stat-pill">Answered: <b id="answeredCount">0</b></div>
    <div class="stat-pill">Score: <b id="scoreCount">0</b></div>
  </div>
</header>

<div class="filter-bar">
  <span class="filter-label">Topic</span>
  <button class="chip active" onclick="filterCards('all',this)">All</button>
  <button class="chip" onclick="filterCards('skeletal',this)">Skeletal System</button>
  <button class="chip" onclick="filterCards('anatomy',this)">Anatomical Positions</button>
  <button class="chip" onclick="filterCards('instruments',this)">Instruments & Procedures</button>
  <button class="chip" onclick="filterCards('specialties',this)">Specialties & Specialists</button>
  &nbsp;
  <span class="filter-label">Difficulty</span>
  <button class="chip" onclick="filterDiff('all',this)">All</button>
  <button class="chip" onclick="filterDiff('mild',this)">Mild</button>
  <button class="chip" onclick="filterDiff('medium',this)">Medium</button>
  <button class="chip" onclick="filterDiff('hard',this)">Hard</button>
</div>

<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-text" id="progressText">0 of 0 answered</div>
</div>

<div id="resultBanner" class="result-banner">
  <div class="result-inner">
    <div class="result-score" id="resultScore">0%</div>
    <div class="result-label">Final Score</div>
    <div class="result-msg" id="resultMsg"></div>
    <button class="btn-reset" onclick="resetAll()">Reset All Questions</button>
  </div>
</div>

<div class="quiz-grid" id="quizGrid"></div>

<div class="submit-wrap">
  <button class="btn-submit" onclick="submitAll()">Submit &amp; See Results</button>
</div>

<script>
const ALL_QUESTIONS = [

// ═══════════════════════════════════
// SECTION: SKELETAL SYSTEM
// ═══════════════════════════════════

// — MILD —
{t:'skeletal',d:'mild',q:'How many bones does the adult human skeleton consist of?',
 opts:['186','196','206','216'],ans:2,
 exp:'The adult human skeleton consists of approximately <strong>206 bones</strong>.',
 why:['186 is too low — not the correct count.','196 is not the standard number.','<strong>206 is correct</strong>.','216 exceeds the actual number.']},

{t:'skeletal',d:'mild',q:'The skeletal system serves as the body\'s ___.',
 opts:['Central processing unit','Central framework','Primary pump','Filtration system'],ans:1,
 exp:'The skeletal system is the body\'s <strong>central framework</strong>, consisting of connective tissue including bones, cartilage, tendons, and ligaments.',
 why:['That describes the brain.','<strong>Central framework</strong> is the correct term.','That describes the heart.','That describes the kidneys.']},

{t:'skeletal',d:'mild',q:'Which of the following is NOT a function of the skeletal system?',
 opts:['Supports the body','Facilitates movement','Produces hormones','Produces blood cells'],ans:2,
 exp:'The skeletal system supports, facilitates movement, protects organs, produces blood cells, and stores/releases minerals and fat. <strong>Producing hormones</strong> is an endocrine function.',
 why:['This IS a function of the skeleton.','This IS a function of the skeleton.','<strong>Hormones are produced by endocrine glands</strong>, not the skeleton.','This IS a function — in bone marrow.']},

{t:'skeletal',d:'mild',q:'The skeleton is subdivided into the appendicular skeleton and the ___.',
 opts:['Peripheral skeleton','Axial skeleton','Central skeleton','Cranial skeleton'],ans:1,
 exp:'The skeletal system is subdivided into the <strong>appendicular skeleton</strong> and the <strong>axial skeleton</strong>.',
 why:['There is no "peripheral skeleton" classification.','<strong>Axial skeleton</strong> is correct.','Not a standard classification.','Not a standard classification.']},

{t:'skeletal',d:'mild',q:'The femur is known as the ___ bone.',
 opts:['Kneecap','Thigh','Lower leg','Ankle'],ans:1,
 exp:'The <strong>femur</strong> is the thigh bone and also the longest bone in the human body.',
 why:['The kneecap is the patella.','<strong>Femur = thigh bone</strong>. Correct!','The lower leg has the tibia and fibula.','Ankle bones are the tarsals.']},

{t:'skeletal',d:'mild',q:'What is the medical term for the kneecap?',
 opts:['Fibula','Tibia','Patella','Femur'],ans:2,
 exp:'The <strong>patella</strong> is the kneecap — a sesamoid bone located at the front of the knee.',
 why:['Fibula is the smaller lower leg bone.','Tibia is the larger lower leg bone.','<strong>Patella</strong> is correct!','Femur is the thigh bone.']},

{t:'skeletal',d:'mild',q:'The clavicle is also known as the ___.',
 opts:['Shoulder blade','Breastbone','Collarbone','Elbow bone'],ans:2,
 exp:'The <strong>clavicle</strong> is the collarbone — it connects the sternum to the scapula.',
 why:['Shoulder blade is the scapula.','Breastbone is the sternum.','<strong>Clavicle = collarbone</strong>. Correct!','There is no single "elbow bone" term.']},

{t:'skeletal',d:'mild',q:'The scapula is the ___.',
 opts:['Collarbone','Shoulder bone','Wrist bone','Hip bone'],ans:1,
 exp:'The <strong>scapula</strong> is the shoulder bone (shoulder blade). It is classified as a flat bone.',
 why:['Collarbone is the clavicle.','<strong>Scapula = shoulder bone</strong>. Correct!','Wrist bones are carpals.','Hip bone is the pelvis.']},

{t:'skeletal',d:'mild',q:'The sternum is also called the ___.',
 opts:['Shoulder blade','Rib','Breastbone','Collarbone'],ans:2,
 exp:'The <strong>sternum</strong> is the breastbone. The rib cage is formed by the sternum and 12 pairs of ribs.',
 why:['Shoulder blade is the scapula.','Ribs are separate bones from the sternum.','<strong>Sternum = breastbone</strong>. Correct!','Collarbone is the clavicle.']},

{t:'skeletal',d:'mild',q:'Carpals are the bones of the ___.',
 opts:['Foot','Ankle','Wrist','Fingers'],ans:2,
 exp:'<strong>Carpals</strong> are the 8 small bones of the wrist. Metacarpals form the hand, and phalanges are the finger bones.',
 why:['Foot bones are metatarsals and tarsals.','Ankle bones are tarsals.','<strong>Carpals = wrist bones</strong>. Correct!','Finger bones are phalanges.']},

{t:'skeletal',d:'mild',q:'Tarsals are the bones of the ___.',
 opts:['Wrist','Hand','Ankle','Knee'],ans:2,
 exp:'<strong>Tarsals</strong> are the 7 ankle bones. Tarsals in the foot correspond to carpals in the wrist.',
 why:['Wrist bones are carpals.','Hand bones are metacarpals.','<strong>Tarsals = ankle bones</strong>. Correct!','The knee has the patella (kneecap).']},

{t:'skeletal',d:'mild',q:'Metatarsals are the bones of the ___.',
 opts:['Ankle','Foot','Wrist','Lower leg'],ans:1,
 exp:'<strong>Metatarsals</strong> are the 5 long bones of the foot, similar to how metacarpals are the 5 hand bones.',
 why:['Ankle bones are tarsals.','<strong>Metatarsals = foot bones</strong>. Correct!','Wrist bones are carpals.','Lower leg has tibia and fibula.']},

{t:'skeletal',d:'mild',q:'The humerus is the bone of the ___.',
 opts:['Forearm','Upper arm','Lower leg','Shoulder'],ans:1,
 exp:'The <strong>humerus</strong> is the elongated bone extending from the shoulder to the elbow — the upper arm bone.',
 why:['Forearm bones are radius and ulna.','<strong>Humerus = upper arm bone</strong>. Correct!','Lower leg has tibia and fibula.','The shoulder is the scapula/clavicle.']},

{t:'skeletal',d:'mild',q:'The ulna is described as ___.',
 opts:['The lateral forearm bone','The largest forearm bone','The shortest arm bone','The knee bone'],ans:1,
 exp:'The <strong>ulna</strong> is the largest bone of the forearm (on the little-finger side), while the radius is on the lateral/thumb side.',
 why:['The radius is the lateral forearm bone (thumb side).','<strong>Ulna = largest forearm bone</strong>. Correct!','The ulna is not the shortest.','The knee bone is the patella.']},

{t:'skeletal',d:'mild',q:'The radius is located ___.',
 opts:['On the little-finger side of the forearm','On the thumb side of the forearm','Above the elbow','In the upper arm'],ans:1,
 exp:'The <strong>radius</strong> is on the lateral (thumb) side of the forearm, while the ulna is on the medial (little-finger) side.',
 why:['That is the ulna.','<strong>Radius = thumb side</strong>. Correct!','The radius is below the elbow.','The upper arm bone is the humerus.']},

// — MEDIUM —
{t:'skeletal',d:'medium',q:'How many bones are in the appendicular skeleton of an adult?',
 opts:['80','106','126','146'],ans:2,
 exp:'The appendicular skeleton of an adult contains <strong>126 bones</strong>, including all bones of the upper and lower limbs plus the girdles.',
 why:['80 is too few.','106 is not the correct number.','<strong>126 bones</strong> is correct!','146 is too many.']},

{t:'skeletal',d:'medium',q:'The axial skeleton serves as the ___.',
 opts:['Limb support structure','Central core unit','Peripheral attachment','Pelvic girdle'],ans:1,
 exp:'The <strong>axial skeleton</strong> forms the central core unit, consisting of the skull, vertebral column, and rib cage.',
 why:['Limb support is the appendicular skeleton\'s role.','<strong>Central core unit</strong> is correct!','The axial skeleton is central, not peripheral.','The pelvic girdle is part of the appendicular skeleton.']},

{t:'skeletal',d:'medium',q:'The skull consists of how many cranial and facial bones?',
 opts:['16','18','22','26'],ans:2,
 exp:'The skull consists of <strong>22</strong> cranial and facial bones, tightly fused together. The mandible is the only mobile bone.',
 why:['16 is too few.','18 is not the standard count.','<strong>22 bones</strong> is correct!','26 is the number of vertebral column bones.']},

{t:'skeletal',d:'medium',q:'Which bone of the skull is the ONLY mobile bone?',
 opts:['Frontal bone','Temporal bone','Mandible','Maxilla'],ans:2,
 exp:'The <strong>mandible</strong> (lower jaw) is the only mobile bone in the skull. All other 21 bones are tightly fused.',
 why:['The frontal bone is fused.','The temporal bone is fused.','<strong>Mandible</strong> is the only mobile skull bone!','The maxilla is fused.']},

{t:'skeletal',d:'medium',q:'The vertebral column in an adult consists of how many bones?',
 opts:['22','24','26','33'],ans:2,
 exp:'The adult vertebral column has <strong>26 bones</strong>: 24 separate vertebrae plus the sacrum and coccyx (each fused).',
 why:['22 is the number of skull bones.','24 refers only to the separate vertebrae, not including sacrum and coccyx.','<strong>26 bones</strong> in the adult spine.','33 is the total in children before fusion.']},

{t:'skeletal',d:'medium',q:'How many cervical vertebrae are in the vertebral column?',
 opts:['5','7','10','12'],ans:1,
 exp:'There are <strong>7 cervical vertebrae</strong> in the neck region of the vertebral column.',
 why:['5 is the number of lumbar vertebrae.','<strong>7 cervical vertebrae</strong>. Correct!','10 is not a standard region count.','12 is the number of thoracic vertebrae.']},

{t:'skeletal',d:'medium',q:'The thoracic vertebrae are located in the ___.',
 opts:['Neck','Chest','Lower back','Tailbone'],ans:1,
 exp:'The 12 <strong>thoracic</strong> vertebrae are located in the chest region, and they articulate with the 12 pairs of ribs.',

// ── State ──
let answeredCount = 0, scoreCount = 0;
let topicFilter = 'all', diffFilter = 'all';

function buildCards() {
  const grid = document.getElementById('quizGrid');
  grid.innerHTML = '';
  document.getElementById('totalCount').textContent = ALL_QUESTIONS.length;
  updateStats();

  ALL_QUESTIONS.forEach((q, i) => {
    const delay = Math.min(i * 30, 800);
    const card = document.createElement('div');
    card.className = 'q-card';
    card.dataset.topic = q.t;
    card.dataset.diff = q.d;
    card.dataset.idx = i;
    card.style.animationDelay = delay + 'ms';

    const letters = ['A','B','C','D'];
    const optsHTML = q.opts.map((o,j) => `
      <button class="opt" onclick="selectAnswer(${i},${j},this)" data-opt="${j}">
        <span class="opt-letter">${letters[j]}</span>
        <span class="opt-text">${o}</span>
        <span class="opt-check"></span>
        <div class="info-wrap" onclick="event.stopPropagation()">
          <div class="info-btn" title="Why is this wrong/right?">i</div>
          <div class="info-popup">${q.why[j]}</div>
        </div>
      </button>`).join('');

    card.innerHTML = `
      <div class="card-meta">
        <span class="q-num">Q${i+1} <span class="topic-tag">${topicLabel(q.t)}</span></span>
        <span class="diff-badge diff-${q.d}">${q.d}</span>
      </div>
      <div class="q-text">${q.q}</div>
      <div class="options">${optsHTML}</div>
      <div class="explanation" id="exp-${i}">
        📖 <strong>Explanation:</strong> ${q.exp}
      </div>`;
    grid.appendChild(card);
  });
  updateProgress();
}

function topicLabel(t) {
  const map = {skeletal:'Skeletal',anatomy:'Anatomical',instruments:'Instruments',specialties:'Specialties'};
  return map[t] || t;
}

function selectAnswer(qIdx, optIdx, btn) {
  const card = document.querySelector(`[data-idx="${qIdx}"]`);
  if (card.classList.contains('answered')) return;
  card.classList.add('answered');

  const q = ALL_QUESTIONS[qIdx];
  const opts = card.querySelectorAll('.opt');
  opts.forEach(o => o.classList.add('locked'));

  const chosen = opts[optIdx];
  const correct = opts[q.ans];

  correct.classList.add('correct-ans');
  correct.querySelector('.opt-check').textContent = '✓';

  if (optIdx !== q.ans) {
    chosen.classList.add('wrong-ans');
    chosen.querySelector('.opt-check').textContent = '✗';
  } else {
    scoreCount++;
  }

  answeredCount++;
  document.getElementById('exp-' + qIdx).classList.add('show');
  updateStats();
  updateProgress();
}

function updateStats() {
  document.getElementById('answeredCount').textContent = answeredCount;
  document.getElementById('scoreCount').textContent = scoreCount;
}

function updateProgress() {
  const total = document.querySelectorAll('.q-card:not([style*="display: none"])').length || ALL_QUESTIONS.length;
  const answered = document.querySelectorAll('.q-card.answered:not([style*="display: none"])').length;
  const pct = total ? Math.round((answered / total) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${answered} of ${total} answered (${pct}%)`;
}

function filterCards(topic, btn) {
  document.querySelectorAll('.filter-bar .chip').forEach((c,i) => { if(i<5) c.classList.remove('active'); });
  btn.classList.add('active');
  topicFilter = topic;
  applyFilters();
}

function filterDiff(diff, btn) {
  document.querySelectorAll('.filter-bar .chip').forEach((c,i) => { if(i>=5) c.classList.remove('active'); });
  btn.classList.add('active');
  diffFilter = diff;
  applyFilters();
}

function applyFilters() {
  const cards = document.querySelectorAll('.q-card');
  cards.forEach(card => {
    const tMatch = topicFilter === 'all' || card.dataset.topic === topicFilter;
    const dMatch = diffFilter === 'all' || card.dataset.diff === diffFilter;
    card.style.display = (tMatch && dMatch) ? '' : 'none';
  });
  updateProgress();
}

function submitAll() {
  const total = ALL_QUESTIONS.length;
  const pct = Math.round((scoreCount / total) * 100);
  const banner = document.getElementById('resultBanner');
  banner.style.display = 'block';
  document.getElementById('resultScore').textContent = pct + '%';
  let msg = pct >= 90 ? '🏆 Excellent! You have mastered these topics.' :
            pct >= 75 ? '👏 Great job! Review the missed questions.' :
            pct >= 60 ? '📚 Good effort! More study recommended.' :
            '💪 Keep studying — review the explanations carefully.';
  document.getElementById('resultMsg').textContent = msg + ` (${scoreCount}/${total} correct)`;
  banner.scrollIntoView({behavior:'smooth'});
}

function resetAll() {
  answeredCount = 0; scoreCount = 0;
  document.getElementById('resultBanner').style.display = 'none';
  buildCards();
  applyFilters();
  window.scrollTo({top:0,behavior:'smooth'});
}

buildCards();
</script>
